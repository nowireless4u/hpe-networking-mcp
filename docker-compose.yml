services:
  hpe-networking-mcp:
    # Pre-built image (default â€” supports amd64 and arm64):
    image: ghcr.io/nowireless4u/hpe-networking-mcp:latest
    # To build from source instead, comment out 'image' and uncomment 'build':
    # build: .
    ports:
      - "0.0.0.0:${MCP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - MCP_PORT=${MCP_PORT:-8000}
      - MCP_HOST=0.0.0.0
      - CUSTOMER_NAME=${CUSTOMER_NAME:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # --- Platform credentials (set in .env or shell) ---
      # Mist
      - MIST_API_TOKEN=${MIST_API_TOKEN:-}
      - MIST_HOST=${MIST_HOST:-}
      # Aruba Central
      - CENTRAL_BASE_URL=${CENTRAL_BASE_URL:-}
      - CENTRAL_CLIENT_ID=${CENTRAL_CLIENT_ID:-}
      - CENTRAL_CLIENT_SECRET=${CENTRAL_CLIENT_SECRET:-}
      # HPE GreenLake
      - GREENLAKE_API_BASE_URL=${GREENLAKE_API_BASE_URL:-}
      - GREENLAKE_CLIENT_ID=${GREENLAKE_CLIENT_ID:-}
      - GREENLAKE_CLIENT_SECRET=${GREENLAKE_CLIENT_SECRET:-}
      - GREENLAKE_WORKSPACE_ID=${GREENLAKE_WORKSPACE_ID:-}
      # ClearPass
      - CLEARPASS_SERVER=${CLEARPASS_SERVER:-}
      - CLEARPASS_CLIENT_ID=${CLEARPASS_CLIENT_ID:-}
      - CLEARPASS_CLIENT_SECRET=${CLEARPASS_CLIENT_SECRET:-}
      - CLEARPASS_VERIFY_SSL=${CLEARPASS_VERIFY_SSL:-}
      # Juniper Apstra
      - APSTRA_SERVER=${APSTRA_SERVER:-}
      - APSTRA_PORT=${APSTRA_PORT:-}
      - APSTRA_USERNAME=${APSTRA_USERNAME:-}
      - APSTRA_PASSWORD=${APSTRA_PASSWORD:-}
      - APSTRA_VERIFY_SSL=${APSTRA_VERIFY_SSL:-}
      # Axis Atmos Cloud
      - AXIS_API_TOKEN=${AXIS_API_TOKEN:-}
      # Aruba OS 8 / Mobility Conductor
      - AOS8_HOST=${AOS8_HOST:-}
      - AOS8_USERNAME=${AOS8_USERNAME:-}
      - AOS8_PASSWORD=${AOS8_PASSWORD:-}
      - AOS8_PORT=${AOS8_PORT:-}
      - AOS8_VERIFY_SSL=${AOS8_VERIFY_SSL:-}
      # HPE UXI
      - UXI_CLIENT_ID=${UXI_CLIENT_ID:-}
      - UXI_CLIENT_SECRET=${UXI_CLIENT_SECRET:-}
      # --- Behavioral settings ---
      - ENABLE_MIST_WRITE_TOOLS=${ENABLE_MIST_WRITE_TOOLS:-false}
      - ENABLE_CENTRAL_WRITE_TOOLS=${ENABLE_CENTRAL_WRITE_TOOLS:-false}
      - ENABLE_CLEARPASS_WRITE_TOOLS=${ENABLE_CLEARPASS_WRITE_TOOLS:-false}
      - ENABLE_APSTRA_WRITE_TOOLS=${ENABLE_APSTRA_WRITE_TOOLS:-false}
      - ENABLE_AXIS_WRITE_TOOLS=${ENABLE_AXIS_WRITE_TOOLS:-false}
      - ENABLE_AOS8_WRITE_TOOLS=${ENABLE_AOS8_WRITE_TOOLS:-false}
      - ENABLE_UXI_WRITE_TOOLS=${ENABLE_UXI_WRITE_TOOLS:-false}
      - DISABLE_ELICITATION=${DISABLE_ELICITATION:-false}
      # Origin validation allowlist. Comma-separated origins, or "*" to
      # disable the check (useful behind a reverse proxy or when binding
      # to 0.0.0.0 for non-localhost access). Default: localhost only.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # PII tokenization (opt-in). When true, sensitive fields (PSKs, RADIUS
      # secrets, hostnames, emails, usernames, serials) are replaced with
      # session-stable [[KIND:uuid]] tokens before responses reach the AI.
      # Default false â€” enable if your AI provider is untrusted or you have
      # data-handling requirements. MAC normalization runs regardless.
      - ENABLE_PII_TOKENIZATION=${ENABLE_PII_TOKENIZATION:-false}
      # Tool exposure mode (since v3.0.0.0 the application default is "code").
      # Uncomment + set to "dynamic" to opt back into the per-platform meta-tool
      # surface (the v2.x default). The "static" value was REMOVED in v3.0.0.0.
      # - MCP_TOOL_MODE=${MCP_TOOL_MODE:-code}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "uv", "run", "--no-sync", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/mcp', timeout=5); assert r.status_code in (200, 405, 406)" ]
      interval: 30s
      timeout: 10s
      retries: 3
