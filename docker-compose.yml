services:
  hpe-networking-mcp:
    # Pre-built image (default — supports amd64 and arm64):
    image: ghcr.io/nowireless4u/hpe-networking-mcp:latest
    # To build from source instead, comment out 'image' and uncomment 'build':
    # build: .
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      - MCP_PORT=8000
      - MCP_HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENABLE_MIST_WRITE_TOOLS=${ENABLE_MIST_WRITE_TOOLS:-false}
      - ENABLE_CENTRAL_WRITE_TOOLS=${ENABLE_CENTRAL_WRITE_TOOLS:-false}
      - ENABLE_CLEARPASS_WRITE_TOOLS=${ENABLE_CLEARPASS_WRITE_TOOLS:-false}
      - ENABLE_APSTRA_WRITE_TOOLS=${ENABLE_APSTRA_WRITE_TOOLS:-false}
      - ENABLE_AXIS_WRITE_TOOLS=${ENABLE_AXIS_WRITE_TOOLS:-false}
      - DISABLE_ELICITATION=${DISABLE_ELICITATION:-false}
      - MCP_TOOL_MODE=${MCP_TOOL_MODE:-dynamic}
    secrets:
      # Mist (remove lines for platforms you don't use)
      - mist_api_token
      - mist_host
      # Aruba Central (remove lines for platforms you don't use)
      - central_base_url
      - central_client_id
      - central_client_secret
      # HPE GreenLake (remove lines for platforms you don't use)
      - greenlake_api_base_url
      - greenlake_client_id
      - greenlake_client_secret
      - greenlake_workspace_id
      # ClearPass (remove lines for platforms you don't use)
      - clearpass_server
      - clearpass_client_id
      - clearpass_client_secret
      - clearpass_verify_ssl
      # Juniper Apstra (remove lines for platforms you don't use)
      - apstra_server
      - apstra_port
      - apstra_username
      - apstra_password
      - apstra_verify_ssl
      # Axis Atmos Cloud (remove lines for platforms you don't use)
      - axis_api_token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/mcp', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

# Each secret is a separate file — create them from the .example templates:
#   cp secrets/mist_api_token.example secrets/mist_api_token
#   # edit with your real credentials
secrets:
  # Mist
  mist_api_token:
    file: ./secrets/mist_api_token
  mist_host:
    file: ./secrets/mist_host
  # Aruba Central
  central_base_url:
    file: ./secrets/central_base_url
  central_client_id:
    file: ./secrets/central_client_id
  central_client_secret:
    file: ./secrets/central_client_secret
  # HPE GreenLake
  greenlake_api_base_url:
    file: ./secrets/greenlake_api_base_url
  greenlake_client_id:
    file: ./secrets/greenlake_client_id
  greenlake_client_secret:
    file: ./secrets/greenlake_client_secret
  greenlake_workspace_id:
    file: ./secrets/greenlake_workspace_id
  # ClearPass
  clearpass_server:
    file: ./secrets/clearpass_server
  clearpass_client_id:
    file: ./secrets/clearpass_client_id
  clearpass_client_secret:
    file: ./secrets/clearpass_client_secret
  clearpass_verify_ssl:
    file: ./secrets/clearpass_verify_ssl
  # Juniper Apstra
  apstra_server:
    file: ./secrets/apstra_server
  apstra_port:
    file: ./secrets/apstra_port
  apstra_username:
    file: ./secrets/apstra_username
  apstra_password:
    file: ./secrets/apstra_password
  apstra_verify_ssl:
    file: ./secrets/apstra_verify_ssl
  # Axis Atmos Cloud
  axis_api_token:
    file: ./secrets/axis_api_token
