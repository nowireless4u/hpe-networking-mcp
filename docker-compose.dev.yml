services:
  hpe-networking-mcp:
    build: .
    volumes:
      # Read-write so in-container formatters (ruff format) can rewrite source.
      # Production docker-compose.yml does not mount src at all — this does not
      # affect end users.
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml:ro
      # Vendored OpenAPI specs (read-only — sync happens via GitHub Actions
      # on the host, not in-container).
      - ./vendor:/app/vendor:ro
      # Dev-only generator / import scripts (Mist regen + Central import).
      # Read-write so the scripts can write generated tool files back into
      # ./src under their own mount. Never copied into the production image
      # by the Dockerfile (only ./src is COPYed). Both the Mist and Central
      # distill/import scripts read their OpenAPI specs from ./vendor (above).
      - ./scripts:/app/scripts
