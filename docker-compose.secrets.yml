# Docker Compose Secrets Overlay — Production Deployments
# ========================================================
# Use this overlay when you want Docker secrets (files mounted at /run/secrets/)
# instead of environment variables. Docker secrets are more secure for production:
# - Not visible in `docker inspect`
# - Not exposed in /proc/<pid>/environ
# - Mounted read-only in the container
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# Prerequisites:
#   Create secret files from templates:
#     cp secrets/mist_api_token.example secrets/mist_api_token
#     # Edit with real credentials
#
# NOTE: Only include secrets for platforms you use. Comment out or remove
# entries for unused platforms to avoid "file not found" errors.

services:
  hpe-networking-mcp:
    secrets:
      # Mist
      - mist_api_token
      - mist_host
      # Aruba Central
      - central_base_url
      - central_client_id
      - central_client_secret
      # HPE GreenLake
      - greenlake_api_base_url
      - greenlake_client_id
      - greenlake_client_secret
      - greenlake_workspace_id
      # ClearPass
      - clearpass_server
      - clearpass_client_id
      - clearpass_client_secret
      - clearpass_verify_ssl
      # Juniper Apstra
      - apstra_server
      - apstra_port
      - apstra_username
      - apstra_password
      - apstra_verify_ssl
      # Axis Atmos Cloud
      - axis_api_token
      # Aruba OS 8 / Mobility Conductor
      - aos8_host
      - aos8_username
      - aos8_password
      - aos8_port
      - aos8_verify_ssl
      # HPE UXI
      - uxi_client_id
      - uxi_client_secret

secrets:
  # Mist
  mist_api_token:
    file: ./secrets/mist_api_token
  mist_host:
    file: ./secrets/mist_host
  # Aruba Central
  central_base_url:
    file: ./secrets/central_base_url
  central_client_id:
    file: ./secrets/central_client_id
  central_client_secret:
    file: ./secrets/central_client_secret
  # HPE GreenLake
  greenlake_api_base_url:
    file: ./secrets/greenlake_api_base_url
  greenlake_client_id:
    file: ./secrets/greenlake_client_id
  greenlake_client_secret:
    file: ./secrets/greenlake_client_secret
  greenlake_workspace_id:
    file: ./secrets/greenlake_workspace_id
  # ClearPass
  clearpass_server:
    file: ./secrets/clearpass_server
  clearpass_client_id:
    file: ./secrets/clearpass_client_id
  clearpass_client_secret:
    file: ./secrets/clearpass_client_secret
  clearpass_verify_ssl:
    file: ./secrets/clearpass_verify_ssl
  # Juniper Apstra
  apstra_server:
    file: ./secrets/apstra_server
  apstra_port:
    file: ./secrets/apstra_port
  apstra_username:
    file: ./secrets/apstra_username
  apstra_password:
    file: ./secrets/apstra_password
  apstra_verify_ssl:
    file: ./secrets/apstra_verify_ssl
  # Axis Atmos Cloud
  axis_api_token:
    file: ./secrets/axis_api_token
  # Aruba OS 8 / Mobility Conductor
  aos8_host:
    file: ./secrets/aos8_host
  aos8_username:
    file: ./secrets/aos8_username
  aos8_password:
    file: ./secrets/aos8_password
  aos8_port:
    file: ./secrets/aos8_port
  aos8_verify_ssl:
    file: ./secrets/aos8_verify_ssl
  # HPE UXI
  uxi_client_id:
    file: ./secrets/uxi_client_id
  uxi_client_secret:
    file: ./secrets/uxi_client_secret
